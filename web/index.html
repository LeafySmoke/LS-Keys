<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LS Keys - Fob</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app" class="hidden">
    <div class="fob">
      <div class="screen">
        <div class="title">LS KEY FOB</div>
        <div id="vehicleLabel" class="subtitle">No vehicle selected</div>
      </div>
      <div id="actions" class="actions">
        <button data-action="lock">LOCK / UNLOCK</button>
        <button data-action="remote_start">REMOTE START</button>
        <button data-action="alarm">ALARM</button>
        <button data-action="trunk">TRUNK</button>
      </div>
      <div id="keychainList" class="keychain hidden"></div>
      <button id="closeBtn" class="close">CLOSE</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
